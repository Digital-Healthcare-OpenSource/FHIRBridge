name: Publish Docker image to GHCR

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing (OIDC)

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/fhirbridge-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # ── Gate: build the native (amd64) image locally and scan it BEFORE any
      # push. A CRITICAL/HIGH vulnerability fails the job so nothing ships.
      - name: Build image for scan (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: fhirbridge-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: fhirbridge-api:scan
          format: table
          exit-code: '1' # fail the job on findings
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max # SLSA build provenance attestation
          sbom: true # attach an SPDX SBOM attestation

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless / Sigstore)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/fhirbridge-api@${DIGEST}"
