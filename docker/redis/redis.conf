# FHIRBridge Redis Configuration
# Redis backs rate limiting, idempotency keys, and the short-lived export/summary
# job cache. Those cached records CAN contain PHI-bearing FHIR bundles for their
# 10-minute TTL, so this config is hardened to uphold the zero-PHI-at-rest
# invariant: persistence is fully disabled and access requires authentication.
# The container mounts /data as tmpfs (see docker-compose.yml) — nothing Redis
# holds is ever written to a durable disk.

# --- Memory Management ---
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# --- Persistence (DISABLED — zero PHI at rest) ---
# save "" turns off RDB snapshots entirely; appendonly no disables the AOF.
# Combined with the tmpfs /data mount, Redis keeps everything in RAM only.
# Do NOT re-enable either directive without removing all PHI-bearing caches.
save ""
appendonly no

# --- Networking / Auth ---
# protected-mode yes refuses unauthenticated access from non-loopback clients.
# requirepass is injected at container start from the REDIS_PASSWORD env var via
# the redis-server --requirepass flag in docker-compose.yml (Redis config files
# cannot interpolate env vars). The host port is bound to 127.0.0.1 only, so the
# instance is reachable from the compose network and localhost, never the LAN.
# For TLS in transit, terminate with stunnel/a proxy and point clients at a
# rediss:// URL (Redis TLS build) — see docs/operations/scaling.md.
protected-mode yes
tcp-backlog 511
timeout 300
tcp-keepalive 60

# --- General ---
loglevel notice
databases 16
always-show-logo no

# --- Slow Log ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Limits ---
maxclients 100
